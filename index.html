<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4b6e,#ff9a9e,#fad0c4);
overflow:hidden;
}

.container{
text-align:center;
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:25px;
backdrop-filter:blur(10px);
color:white;
box-shadow:0 0 25px rgba(0,0,0,.2);
}

img{
width:220px;
height:220px;
border-radius:50%;
border:5px solid white;
object-fit:cover;
margin-bottom:20px;
box-shadow:0 0 20px rgba(255,255,255,.5);
}

h1{
font-size:40px;
margin-bottom:10px;
animation:zoom 2s infinite alternate;
}

.code{
font-size:32px;
font-weight:bold;
color:yellow;
margin:10px 0;
}

p{
font-size:24px;
}

@keyframes zoom{
from{
transform:scale(.95);
}
to{
transform:scale(1.05);
}
}

.heart{
position:absolute;
color:white;
font-size:20px;
animation:float 8s linear infinite;
opacity:.7;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
100%{
transform:translateY(-100px);
opacity:1;
}
}
</style>

</head>
<body>

<div class="container">

<img src="file_000000006bdc8208814c5277686878f0.png">

<h1>🎂 Happy Birthday 🎂</h1>

<div class="code">5201314 ❤️</div>

<p>I Love You Forever 💖</p>

</div>

<script>

for(let i=0;i<40;i++){

let h=document.createElement("div");

h.innerHTML="❤";

h.className="heart";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(5+Math.random()*5)+"s";

h.style.fontSize=(15+Math.random()*30)+"px";

document.body.appendChild(h);

}

</script>

</body>
</html>
